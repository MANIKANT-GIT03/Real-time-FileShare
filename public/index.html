<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Toast container (top-right) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- AUTH VIEW -->
    <div id="auth-view" class="view auth-view">
        <div class="auth-box">
            <h1>📦 FileShare</h1>
            <p class="subtitle">Real-time file sharing</p>

            <!-- Login -->
            <div id="login-panel">
                <input type="email" id="login-email" placeholder="Email" autocomplete="email">
                <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
                <button class="btn-primary" onclick="login()">Log In</button>
                <p class="toggle">No account? <a href="#" onclick="switchAuth('signup')">Sign up</a></p>
                <p class="toggle"><a href="#" onclick="openRedeemFromAuth()">Redeem a share code</a></p>
            </div>

            <!-- Signup -->
            <div id="signup-panel" class="hidden">
                <input type="text" id="signup-username" placeholder="Username" autocomplete="username">
                <input type="email" id="signup-email" placeholder="Email" autocomplete="email">
                <input type="password" id="signup-password" placeholder="Password (8+ chars)" autocomplete="new-password">
                <button class="btn-primary" onclick="signup()">Create Account</button>
                <p class="toggle">Have an account? <a href="#" onclick="switchAuth('login')">Log in</a></p>
            </div>
        </div>
    </div>

    <!-- APP VIEW -->
    <div id="app-view" class="view hidden">
        <header class="app-header">
            <div class="brand">📦 FileShare</div>
            <div class="header-actions">
                <button class="btn-ghost" onclick="openRedeemModal()">Redeem Code</button>
                <div class="user-pill">
                    <span id="user-name"></span>
                    <span id="storage-info" class="storage-badge"></span>
                    <button class="btn-logout" onclick="logout()" title="Logout">⎋</button>
                </div>
            </div>
        </header>

        <main class="app-main">
            <!-- Upload Zone -->
            <div id="upload-zone" class="upload-zone">
                <div class="upload-prompt">
                    <div class="upload-icon">⬆</div>
                    <p><strong>Drag & drop</strong> files here or <span class="link" onclick="document.getElementById('file-input').click()">browse</span></p>
                    <input type="file" id="file-input" hidden onchange="handleFileSelect(event)">
                </div>
                <div id="upload-progress" class="upload-progress hidden">
                    <div class="progress-track">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <span id="progress-text" class="progress-text">0%</span>
                </div>
            </div>

            <!-- File Grid -->
            <div id="file-grid" class="file-grid"></div>

            <!-- Pagination -->
            <div id="pagination" class="pagination"></div>
        </main>
    </div>

    <!-- SHARE MODAL -->
    <div id="share-modal" class="modal hidden" onclick="if(event.target===this) closeShareModal()">
        <div class="modal-card">
            <h3>Create Share</h3>
            <p class="modal-filename" id="share-file-name"></p>

            <div class="form-row">
                <label>Expiry (minutes)</label>
                <input type="number" id="share-expiry" value="30" min="1" max="60">
            </div>
            <div class="form-row">
                <label>Max Downloads <small>(leave empty for unlimited)</small></label>
                <input type="number" id="share-max-downloads" placeholder="Unlimited" min="1">
            </div>

            <div id="share-result" class="share-result hidden">
                <div class="code-box">
                    <span id="share-code" class="code-text"></span>
                    <button class="btn-copy" onclick="copyShareCode()" title="Copy">📋</button>
                </div>
                <div class="countdown" id="share-countdown"></div>
                <p class="hint" id="share-expiry-display"></p>
            </div>

            <div class="modal-actions">
                <button id="btn-generate" class="btn-primary" onclick="createShare()">Generate Code</button>
                <button class="btn-ghost" onclick="closeShareModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- REDEEM MODAL -->
    <div id="redeem-modal" class="modal hidden" onclick="if(event.target===this) closeRedeemModal()">
        <div class="modal-card">
            <h3>Redeem Share Code</h3>
            <input type="text" id="redeem-code" placeholder="000000" maxlength="6" inputmode="numeric" pattern="\d*">
            <button class="btn-primary" onclick="redeemCode()">Redeem</button>

            <div id="redeem-result" class="redeem-result hidden">
                <div class="file-preview">
                    <span class="big-icon">📄</span>
                    <p id="redeem-file-name" class="filename"></p>
                </div>
                <button class="btn-primary" id="redeem-download-btn" onclick="downloadSharedFile()">Download File</button>
            </div>

            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeRedeemModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>
</html>
